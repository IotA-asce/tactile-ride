name: Documentation validation

on:
  pull_request:
  push:
    branches:
      - main
      - "chore/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository scaffold
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Validate documentation and local links
        run: bash tools/validate-repository-structure.sh
